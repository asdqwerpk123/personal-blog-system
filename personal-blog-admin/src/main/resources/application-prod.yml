spring:
  data:
    redis:
      host: ${BLOG_REDIS_PROD_HOST:${BLOG_REDIS_HOST}}
      port: ${BLOG_REDIS_PROD_PORT:${BLOG_REDIS_PORT:6379}}
      password: ${BLOG_REDIS_PROD_PASSWORD:${BLOG_REDIS_PASSWORD:}}
      database: ${BLOG_REDIS_PROD_DATABASE:${BLOG_REDIS_DATABASE:0}}
  datasource:
    druid:
      url: ${BLOG_DB_PROD_URL:jdbc:mysql://localhost:3306/personal_blog_system}
      username: ${BLOG_DB_PROD_USERNAME:root}
      password: ${BLOG_DB_PROD_PASSWORD:change-me}
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 5
      min-idle: 5
      max-active: 20
      test-while-idle: true
      validation-query: SELECT 1
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
blog:
  auth:
    allowed-origins: ${BLOG_ADMIN_ALLOWED_ORIGINS}
    jwt:
      secret: ${BLOG_ADMIN_JWT_SECRET}
      access-token-expire-minutes: ${BLOG_ADMIN_JWT_ACCESS_TOKEN_EXPIRE_MINUTES:120}
minio:
  enabled: ${MINIO_ENABLED:false}
  endpoint: ${MINIO_ENDPOINT:}
  publicEndpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:}}
  accessKey: ${MINIO_ACCESS_KEY:}
  secretKey: ${MINIO_SECRET_KEY:}
  bucketName: ${MINIO_BUCKET_NAME:}
xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://127.0.0.1:8088/xxl-job-admin}
    accessToken: ${XXL_JOB_ACCESS_TOKEN:default_token}
    executor:
      appname: ${XXL_JOB_EXECUTOR_APPNAME:blog-job-executor}
      port: ${XXL_JOB_EXECUTOR_PORT:9999}
      logpath: ${XXL_JOB_EXECUTOR_LOGPATH:logs/xxl-job}
      logretentiondays: ${XXL_JOB_EXECUTOR_LOG_RETENTION_DAYS:30}
