spring:
  data:
    redis:
      host: ${BLOG_REDIS_PROD_HOST:${BLOG_REDIS_HOST}}
      port: ${BLOG_REDIS_PROD_PORT:${BLOG_REDIS_PORT:6379}}
      password: ${BLOG_REDIS_PROD_PASSWORD:${BLOG_REDIS_PASSWORD:}}
      database: ${BLOG_REDIS_PROD_DATABASE:${BLOG_REDIS_DATABASE:0}}
  datasource:
    druid:
      url: ${BLOG_DB_PROD_URL:jdbc:mysql://localhost:3306/personal_blog_system}
      username: ${BLOG_DB_PROD_USERNAME:root}
      password: ${BLOG_DB_PROD_PASSWORD:change-me}
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 5
      min-idle: 5
      max-active: 20
      test-while-idle: true
      validation-query: SELECT 1
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
blog:
  auth:
    allowed-origins: ${BLOG_ADMIN_ALLOWED_ORIGINS}
    jwt:
      secret: ${BLOG_ADMIN_JWT_SECRET}
      access-token-expire-minutes: ${BLOG_ADMIN_JWT_ACCESS_TOKEN_EXPIRE_MINUTES:120}
