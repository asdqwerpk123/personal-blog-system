spring:
  datasource:
    druid:
      url: ${BLOG_DB_PROD_URL:jdbc:mysql://localhost:3306/personal_blog_system}
      username: ${BLOG_DB_PROD_USERNAME:root}
      password: ${BLOG_DB_PROD_PASSWORD:change-me}
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 5
      min-idle: 5
      max-active: 20
      test-while-idle: true
      validation-query: SELECT 1
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true