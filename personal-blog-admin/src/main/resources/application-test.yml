spring:
  datasource:
    druid:
      url: ${BLOG_DB_TEST_URL:${BLOG_DB_URL:jdbc:mysql://localhost:3306/personal_blog_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}}
      username: ${BLOG_DB_TEST_USERNAME:${BLOG_DB_USERNAME:root}}
      password: ${BLOG_DB_TEST_PASSWORD:${BLOG_DB_PASSWORD:123456}}
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 1
      min-idle: 1
      max-active: 5
      test-while-idle: true
      validation-query: SELECT 1
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true