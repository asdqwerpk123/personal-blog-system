spring:
  datasource:
    druid:
      url: ${BLOG_DB_TEST_URL}
      username: ${BLOG_DB_TEST_USERNAME}
      password: ${BLOG_DB_TEST_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 1
      min-idle: 1
      max-active: 5
      test-while-idle: true
      validation-query: SELECT 1
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
