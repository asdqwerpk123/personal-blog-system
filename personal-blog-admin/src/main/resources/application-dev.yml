spring:
  data:
    redis:
      host: ${BLOG_REDIS_HOST:192.168.75.128}
      port: ${BLOG_REDIS_PORT:6379}
      password: ${BLOG_REDIS_PASSWORD:}
      database: ${BLOG_REDIS_DATABASE:0}
  datasource:
    druid:
      url: ${BLOG_DB_URL:jdbc:mysql://localhost:3306/personal_blog_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      username: ${BLOG_DB_USERNAME:root}
      password: ${BLOG_DB_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 5
      min-idle: 5
      max-active: 20
      test-while-idle: true
      validation-query: SELECT 1
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: ${BLOG_DRUID_MONITOR_USERNAME:admin}
        login-password: ${BLOG_DRUID_MONITOR_PASSWORD:admin123}
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: '*.js,*.css,*.png,*.jpg,*.ico,/druid/*'
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
jwt:
  secret: ${JWT_SECRET:${BLOG_ADMIN_JWT_SECRET:your-32-character-secret-key-12345678}}
  expiration: ${JWT_EXPIRATION:86400000}
blog:
  auth:
    allowed-origins: ${BLOG_ADMIN_ALLOWED_ORIGINS:http://localhost:5173}
    jwt:
      secret: ${BLOG_ADMIN_JWT_SECRET:${JWT_SECRET:your-32-character-secret-key-12345678}}
      access-token-expire-minutes: ${BLOG_ADMIN_JWT_ACCESS_TOKEN_EXPIRE_MINUTES:1440}
minio:
  enabled: true
  endpoint: http://192.168.75.128:1900
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: seig-web-minio
xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://127.0.0.1:8088/xxl-job-admin}
    accessToken: ${XXL_JOB_ACCESS_TOKEN:default_token}
    executor:
      appname: ${XXL_JOB_EXECUTOR_APPNAME:blog-job-executor}
      port: ${XXL_JOB_EXECUTOR_PORT:9999}
      logpath: ${XXL_JOB_EXECUTOR_LOGPATH:logs/xxl-job}
      logretentiondays: ${XXL_JOB_EXECUTOR_LOG_RETENTION_DAYS:30}
