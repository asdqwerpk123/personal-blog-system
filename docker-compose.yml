services:
  mysql:
    image: mysql:8.0
    container_name: personal-blog-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: personal_blog_system
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --lower_case_table_names=1
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/personal_blog_system.sql:/docker-entrypoint-initdb.d/01-personal_blog_system.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.2-alpine
    container_name: personal-blog-redis
    restart: unless-stopped
    ports:
      - "6378:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2023-10-07T15-07-38Z
    container_name: personal-blog-minio
    restart: unless-stopped
    ports:
      - "1900:9000"
      - "9090:9090"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9090"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2023-10-06T18-11-29Z
    container_name: personal-blog-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "/init/init.sh"]
    volumes:
      - ./docker/minio/init.sh:/init/init.sh:ro
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: personal-blog-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    volumes:
      - uploads-data:/app/uploads
    environment:
      SPRING_PROFILES_ACTIVE: docker
      BLOG_SERVER_PORT: "8080"
      BLOG_DB_URL: jdbc:mysql://mysql:3306/personal_blog_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      BLOG_DB_USERNAME: root
      BLOG_DB_PASSWORD: 123456
      BLOG_REDIS_HOST: redis
      BLOG_REDIS_PORT: "6379"
      BLOG_REDIS_PASSWORD: ""
      BLOG_REDIS_DATABASE: "0"
      BLOG_ADMIN_ALLOWED_ORIGINS: http://localhost
      BLOG_ADMIN_JWT_SECRET: your-32-character-secret-key-12345678
      MINIO_ENABLED: "true"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:1900
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: personal-blog
      XXL_JOB_ENABLED: "false"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: personal-blog-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"

volumes:
  mysql-data:
  redis-data:
  minio-data:
  uploads-data:
